name: CI

on:
  push:
      branches: [ main, develop ]
        pull_request:
            branches: [ main ]

            env:
              PYTHON_VERSION: "3.11"
                WORKING_DIR:    "ai_robo_advisor"

                jobs:
                  lint:
                      name: Lint & Static Analysis
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4

                                                  - name: Set up Python
                                                          uses: actions/setup-python@v5
                                                                  with:
                                                                            python-version: ${{ env.PYTHON_VERSION }}
                                                                                      cache: pip

                                                                                            - name: Install lint tools
                                                                                                    run: pip install pyflakes bandit
                                                                                                    
                                                                                                          - name: Run pyflakes
                                                                                                                  working-directory: ${{ env.WORKING_DIR }}
                                                                                                                          run: |
                                                                                                                                    python -m pyflakes $(find . -name "*.py" ! -name "app_monolith_backup.py" ! -path "./__pycache__/*" | head -60)
                                                                                                                                    
                                                                                                                                          - name: Run bandit
                                                                                                                                                  working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                          run: |
                                                                                                                                                                    bandit -r . --exclude ./app_monolith_backup.py,./tests --severity-level medium --confidence-level medium
                                                                                                                                                                    
                                                                                                                                                                      unit-tests:
                                                                                                                                                                          name: Unit Tests
                                                                                                                                                                              runs-on: ubuntu-latest
                                                                                                                                                                                  needs: lint
                                                                                                                                                                                      steps:
                                                                                                                                                                                            - name: Checkout repository
                                                                                                                                                                                                    uses: actions/checkout@v4
                                                                                                                                                                                                    
                                                                                                                                                                                                          - name: Set up Python
                                                                                                                                                                                                                  uses: actions/setup-python@v5
                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                    python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                              cache: pip
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                    - name: Install dependencies
                                                                                                                                                                                                                                                            working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                    run: pip install -r requirements.txt
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                          - name: Create secrets stub
                                                                                                                                                                                                                                                                                  working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                    mkdir -p .streamlit
                                                                                                                                                                                                                                                                                                              echo "[mongodb]" > .streamlit/secrets.toml
                                                                                                                                                                                                                                                                                                                        echo 'uri = "mongodb://localhost:27017/"' >> .streamlit/secrets.toml
                                                                                                                                                                                                                                                                                                                                  echo "[gemini]" >> .streamlit/secrets.toml
                                                                                                                                                                                                                                                                                                                                            echo 'api_key = "CI_STUB"' >> .streamlit/secrets.toml
                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                  - name: Run pytest
                                                                                                                                                                                                                                                                                                                                                          working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                            PYTHONPATH: ..
                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                              python -m pytest tests/ -v -m "not requires_mongodb" --ignore=tests/test_database.py --ignore=tests/test_backend_api_integration.py
                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                dependency-audit:
                                                                                                                                                                                                                                                                                                                                                                                                    name: Dependency Audit
                                                                                                                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                            needs: unit-tests
                                                                                                                                                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Checkout repository
                                                                                                                                                                                                                                                                                                                                                                                                                              uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Set up Python
                                                                                                                                                                                                                                                                                                                                                                                                                                            uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                              python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cache: pip
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: pip-audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                pip install pip-audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          pip-audit --requirement ai_robo_advisor/requirements.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          

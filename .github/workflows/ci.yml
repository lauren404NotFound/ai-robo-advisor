# ============================================================
# LEM StratIQ — AI Robo-Advisor
# GitHub Actions CI Pipeline
# ============================================================
#
# Runs on every push and pull request to main.
# Three jobs:
#   1. lint        — code style and import checks (fast, no deps)
#   2. unit-tests  — portfolio engine, explainer, ML model (no MongoDB)
#   3. security    — detect secret patterns with truffleHog lite (bandit)
#
# MongoDB-dependent tests (test_database.py, test_backend_api_integration.py)
# are skipped in CI using the `not requires_mongodb` pytest marker.  They are
# intended to run locally against a real Atlas instance, or in a staging
# environment with MONGODB_URI set.
# ============================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIR:    "ai_robo_advisor"

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Lint & static analysis
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install pyflakes bandit

      - name: pyflakes — check for undefined names & unused imports
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python -m pyflakes $(find . -name "*.py" \
            ! -name "app_monolith_backup.py" \
            ! -path "./__pycache__/*" \
            | head -60) 2>&1 | tee pyflakes_report.txt || true
          # Warn only — cross-module variables injected by app.py at runtime
          # appear as "undefined name" to static analysis but are not real bugs.
          if grep -E "^.*undefined name" pyflakes_report.txt; then
            echo "::warning::pyflakes found undefined names (may be cross-module runtime vars)"
          fi
          echo "pyflakes check complete (warnings only, not blocking)"


      - name: bandit — security-focused static analysis
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          bandit -r . \
            --exclude ./app_monolith_backup.py,./tests \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            -o bandit_report.txt || true
          cat bandit_report.txt
          # Fail if HIGH severity issues found
          if grep -E "Severity: High" bandit_report.txt; then
            echo "::error::High-severity bandit issues found"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────
  # Job 2: Unit & integration tests (no MongoDB required)
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pip install -r requirements.txt

      - name: Create minimal secrets stub for Streamlit imports
        # database.py imports st.secrets at module level; provide a stub
        # so tests that import database don't crash in CI
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml << 'EOF'
          [mongodb]
          uri = "mongodb://localhost:27017/"

          [gemini]
          api_key = "CI_STUB_NOT_REAL"

          [anthropic]
          api_key = "CI_STUB_NOT_REAL"

          [stripe]
          stripe_secret_key = ""
          EOF

      - name: Run unit tests (excluding MongoDB-dependent tests)
        working-directory: ${{ env.WORKING_DIR }}
        env:
          PYTHONPATH: ..
        run: |
          pip install pytest-cov
          python -m pytest tests/ \
            -v \
            --tb=short \
            -m "not requires_mongodb" \
            --ignore=tests/test_database.py \
            --ignore=tests/test_backend_api_integration.py \
            --junit-xml=test-results.xml \
            --cov=. \
            --cov-report=term-missing \
            --cov-omit="app_monolith_backup.py,tests/*"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ai_robo_advisor/test-results.xml

  # ────────────────────────────────────────────────────────────
  # Job 3: Dependency audit
  # ────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pip install -r requirements.txt

      - name: pip-audit — check for known CVEs in dependencies
        run: |
          pip install pip-audit
          pip-audit \
            --requirement ai_robo_advisor/requirements.txt \
            --format markdown \
            --output pip_audit_report.md || true
          cat pip_audit_report.md
          # Fail on CRITICAL vulnerabilities only
          if grep -iE "CRITICAL|HIGH" pip_audit_report.md; then
            echo "::warning::Vulnerable dependencies found — review pip_audit_report.md"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: pip_audit_report.md

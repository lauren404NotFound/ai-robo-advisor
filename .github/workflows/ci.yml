name: CI

on:
  push:
      branches: [ main, develop ]
        pull_request:
            branches: [ main ]

            env:
              PYTHON_VERSION: "3.11"
                WORKING_DIR: "ai_robo_advisor"

                jobs:
                  unit-tests:
                      name: Unit Tests
                          runs-on: ubuntu-latest
                              steps:
                                    - name: Checkout repository
                                            uses: actions/checkout@v4

                                                  - name: Set up Python
                                                          uses: actions/setup-python@v5
                                                                  with:
                                                                            python-version: ${{ env.PYTHON_VERSION }}
                                                                                      cache: pip

                                                                                            - name: Install dependencies
                                                                                                    working-directory: ${{ env.WORKING_DIR }}
                                                                                                            run: pip install -r requirements.txt
                                                                                                            
                                                                                                                  - name: Create secrets stub
                                                                                                                          working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                  run: |
                                                                                                                                            mkdir -p .streamlit
                                                                                                                                                      printf '[mongodb]\nuri = "mongodb://localhost:27017/"\n[gemini]\napi_key = "stub"\n[anthropic]\napi_key = "stub"\n[stripe]\nstripe_secret_key = ""\n' > .streamlit/secrets.toml
                                                                                                                                                      
                                                                                                                                                            - name: Run unit tests
                                                                                                                                                                    working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                            env:
                                                                                                                                                                                      PYTHONPATH: ..
                                                                                                                                                                                              run: |
                                                                                                                                                                                                        python -m pytest tests/ -v --tb=short --ignore=tests/test_database.py --ignore=tests/test_backend_api_integration.py
                                                                                                                                                                                                        

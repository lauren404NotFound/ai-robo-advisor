# ============================================================
# LEM StratIQ # ============================================================
# LEM StratIQ - AI Robo-Advisor
# GitHub Actions CI Pipeline
# ============================================================
#
# Runs on every push and pull request to main.
# Three jobs:
#   1. lint        - code style and import checks (fast, no deps)
#   2. unit-tests  - portfolio engine, explainer, ML model (no MongoDB)
#   3. security    - detect secret patterns with truffleHog lite (bandit)
#
# MongoDB-dependent tests (test_database.py, test_backend_api_integration.py)
# are skipped in CI using the `not requires_mongodb` pytest marker.  They are
# intended to run locally against a real Atlas instance, or in a staging
# environment with MONGODB_URI set.
# ============================================================

name: CI

on:
  push:
      branches: [ main, develop ]
        pull_request:
            branches: [ main ]

            env:
              PYTHON_VERSION: "3.11"
                WORKING_DIR:    "ai_robo_advisor"

                jobs:
                  # ------------------------------------------------------------
                    # Job 1: Lint & static analysis
                      # ------------------------------------------------------------
                        lint:
                            name: Lint & Static Analysis
                                runs-on: ubuntu-latest
                                    steps:
                                          - name: Checkout repository
                                                  uses: actions/checkout@v4

                                                        - name: Set up Python ${{ env.PYTHON_VERSION }}
                                                                uses: actions/setup-python@v5
                                                                        with:
                                                                                  python-version: ${{ env.PYTHON_VERSION }}
                                                                                            cache: pip

                                                                                                  - name: Install lint tools
                                                                                                          run: pip install pyflakes bandit
                                                                                                          
                                                                                                                - name: pyflakes - check for undefined names & unused imports
                                                                                                                        working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                run: |
                                                                                                                                          python -m pyflakes $(find . -name "*.py" \
                                                                                                                                                      ! -name "app_monolith_backup.py" \
                                                                                                                                                                  ! -path "./__pycache__/*" \
                                                                                                                                                                              | head -60) 2>&1 | tee pyflakes_report.txt || true
                                                                                                                                                                                        if grep -E "^.*undefined name" pyflakes_report.txt; then
                                                                                                                                                                                                    echo "::error::Undefined names found"
                                                                                                                                                                                                                exit 1
                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                          
                                                                                                                                                                                                                                - name: bandit - security-focused static analysis
                                                                                                                                                                                                                                        working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                          bandit -r . \
                                                                                                                                                                                                                                                                      --exclude ./app_monolith_backup.py,./tests \
                                                                                                                                                                                                                                                                                  --severity-level medium \
                                                                                                                                                                                                                                                                                              --confidence-level medium \
                                                                                                                                                                                                                                                                                                          -f txt \
                                                                                                                                                                                                                                                                                                                      -o bandit_report.txt || true
                                                                                                                                                                                                                                                                                                                                cat bandit_report.txt
                                                                                                                                                                                                                                                                                                                                          if grep -E "Severity: High" bandit_report.txt; then
                                                                                                                                                                                                                                                                                                                                                      echo "::error::High-severity bandit issues found"
                                                                                                                                                                                                                                                                                                                                                                  exit 1
                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                              # ------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                # Job 2: Unit tests (no MongoDB required)
                                                                                                                                                                                                                                                                                                                                                                                  # ------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                    unit-tests:
                                                                                                                                                                                                                                                                                                                                                                                        name: Unit Tests
                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                needs: lint
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                          - name: Checkout repository
                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Set up Python ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                  python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                            cache: pip
                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Install dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: pip install -r requirements.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Create secrets stub for Streamlit imports
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  mkdir -p .streamlit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cat > .streamlit/secrets.toml << 'EOF'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      [mongodb]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uri = "mongodb://localhost:27017/"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          [gemini]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    api_key = "CI_STUB_NOT_REAL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              [anthropic]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        api_key = "CI_STUB_NOT_REAL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  [stripe]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            stripe_secret_key = ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Run unit tests
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    working-directory: ${{ env.WORKING_DIR }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      PYTHONPATH: ..
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        python -m pytest tests/ \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -v \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --tb=short \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -m "not requires_mongodb" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --ignore=tests/test_database.py \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --ignore=tests/test_backend_api_integration.py \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --junit-xml=test-results.xml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Upload test results
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: test-results
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  path: ai_robo_advisor/test-results.xml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # ------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Job 3: Dependency audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          dependency-audit:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: Dependency Audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      needs: unit-tests
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Checkout repository
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Set up Python ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  cache: pip
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: pip-audit - check for known CVEs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          pip install pip-audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    pip-audit \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --requirement ai_robo_advisor/requirements.txt \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --format markdown \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --output pip_audit_report.md || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  cat pip_audit_report.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload audit report
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: dependency-audit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: pip_audit_report.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    

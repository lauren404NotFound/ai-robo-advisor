[pytest]
# ── Test discovery ────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Custom markers ────────────────────────────────────────────
# Mark tests that require a live MongoDB connection with:
#   @pytest.mark.requires_mongodb
# These are skipped in CI (no Atlas available) but run locally.
markers =
    requires_mongodb: marks tests that need a live MongoDB connection (skipped in CI)
    slow: marks tests that are slow to run (deselect with -m "not slow")

# ── Output options ────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Coverage (when --cov flag is passed) ─────────────────────
# Install pytest-cov: pip install pytest-cov
[coverage:run]
source = .
omit =
    app_monolith_backup.py
    tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
